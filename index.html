<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maanya Arora | Official Bio</title>
    <link rel="icon" type="image/gif" href="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNXFqMHRtc2Jzd2t2cDMzN3EwaWV1NXRlNXdjcHNrNzJ6d2dhZHhnYiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/l4FGG5zOIrDjoZ1PG/giphy.gif">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <meta name="description" content="Official bio and links for Maanya Arora, Soulful Devotional & Folk Singer.">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #a5d8ff;
            --bg-overlay: rgba(0, 0, 0, 0.4);
            --card-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #050a14;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background Immersive Layer */
        .bg-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: url("https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExN2Npd2xrcnQ3cDIyempzOXVtdHh3Zmsyd3IxMjkyNjd0bDRtNWx6aiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/xUOxeSTrDP4vsF2TXq/giphy.gif") center/cover no-repeat;
            filter: brightness(0.8) contrast(1.1);
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7));
            backdrop-filter: blur(2px);
        }

        /* Snow Effect */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Enter Overlay */
        .enter-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050a14;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
        }

        .enter-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .enter-btn {
            background: none;
            border: 1px solid var(--glass-border);
            color: white;
            padding: 15px 40px;
            font-size: 1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .enter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
            letter-spacing: 0.4em;
            transform: scale(1.05);
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .container.show {
            opacity: 1;
            transform: translateY(0);
        }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .avatar-wrap {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(45deg, #1a2a4a, #2c3e50);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
            border: 4px solid var(--glass-border);
            box-shadow: 0 0 20px rgba(165, 216, 255, 0.2);
        }

        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            background: #2ecc71;
            border-radius: 50%;
            border: 3px solid #1a2a4a;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 16px 24px;
            border-radius: 16px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 400;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(5px);
            border-color: var(--accent);
        }

        .link-btn span {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .link-btn svg {
            width: 20px;
            height: 20px;
            opacity: 0.8;
        }

        /* Spotify Widget */
        .spotify-wrap {
            border-radius: 18px;
            overflow: hidden;
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
        }

        /* Custom Cursor */
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            transform: translate(-50%, -50%);
        }

        .cursor-dot {
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            .profile-card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-dot"></div>

    <!-- Background -->
    <div class="bg-wrap"></div>
    <div class="bg-overlay"></div>
    <canvas id="snow-canvas"></canvas>

    <!-- Enter Overlay -->
    <div class="enter-screen" id="enter-screen">
        <button class="enter-btn" onclick="startApp()">Enter Experience</button>
    </div>

    <!-- Main Bio Content -->
    <div class="container" id="main-container">
        <div class="profile-card">
            <div class="avatar-wrap">
                <div class="avatar">M</div>
                <div class="status-dot"></div>
            </div>
            
            <h1>Maanya Arora</h1>
            <p class="tagline">Soulful Devotional & Folk Singer</p>

            <div class="links">
                <a href="https://www.instagram.com/m_s_sahasra" target="_blank" class="link-btn">
                    <span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                        Instagram
                    </span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                </a>

                <a href="https://www.snapchat.com/add/Maanya_raja24" target="_blank" class="link-btn">
                    <span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C7.03 2 3 6.03 3 11c0 2.22.81 4.25 2.15 5.84l-1.01 2.52a1 1 0 0 0 1.28 1.28l2.52-1.01C9.75 21.19 11.78 22 14 22c4.97 0 9-4.03 9-9s-4.03-9-9-9z"></path></svg>
                        Snapchat
                    </span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                </a>
            </div>
        </div>
        <div id="music-indicator" style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--accent); opacity: 0; transition: opacity 1s ease;">
            <span class="music-wave"></span>
            Playing: Deewaana Deewaana
        </div>
    </div>

    <!-- Background Audio Helper -->
    <div id="bg-audio-container" style="position: fixed; top: -100px; left: -100px; width: 10px; height: 10px; opacity: 0.01; pointer-events: none; z-index: -100;"></div>

    <script>
        // Start App Function
        function startApp() {
            document.getElementById('enter-screen').classList.add('fade-out');
            document.getElementById('main-container').classList.add('show');
            document.getElementById('music-indicator').style.opacity = "0.7";
            
            // Try to trigger background audio using Spotify
            const spotifyUrl = "https://open.spotify.com/embed/track/47RTQoh3pzjhWLUMllNRRJ?utm_source=generator&autoplay=1";
            const bgAudioContainer = document.getElementById('bg-audio-container');
            
            console.log("Starting background music...");
            
            // Set Spotify as true background player
            bgAudioContainer.innerHTML = `<iframe 
                width="100" 
                height="100" 
                src="${spotifyUrl}" 
                allow="autoplay; encrypted-media" 
                frameborder="0">
            </iframe>`;
        }

        // Custom Cursor
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
        });

        // Snow Animation
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 1 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        animate();
    </script>
    <script id="tfx12"> 
        const text = "Maanya  | Official Bio"; 
        let index = 0; 
        
        function typeTitle() { 
          if (index <= text.length) { 
            document.title = text.substring(0, index) + (index < text.length ? "|" : ""); 
            index++; 
            setTimeout(typeTitle, 150); 
          } else { 
            setTimeout(() => {
              index = 0; 
              typeTitle();
            }, 3000); // Wait 3 seconds before restarting
          } 
        } 
        
        window.onload = typeTitle;
    </script>
</body>
</html>
